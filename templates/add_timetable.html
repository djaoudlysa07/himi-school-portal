{% extends "base.html" %}
{% block title %}Manage Timetable{% endblock %}
{% block page_title %}Manage Timetable{% endblock %}

{% block subtitle %}Add a new entry to the weekly schedule{% endblock %}
{% block content %}
<div class="card" style="max-width:560px;">
  <div class="card-head"><div class="card-title">New Timetable Entry</div></div>
  <form method="POST">
    <div class="form-row f2">
      <div class="form-group"><label class="form-label">Day</label>
        <select class="form-ctrl" name="day">
          <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
        </select></div>
      <div class="form-group"><label class="form-label">Period</label>
        <select class="form-ctrl" name="period">
          <option>08:00-10:00</option><option>10:15-12:15</option><option>13:30-15:30</option>
        </select></div>
    </div>
    <div class="form-group"><label class="form-label">Subject</label>
      <input class="form-ctrl" type="text" name="subject" required placeholder="e.g. Management Fundamentals"></div>
    <div class="form-row f2">
      <div class="form-group"><label class="form-label">Teacher</label>
        <select class="form-ctrl" name="teacher">
          {% for t in teachers %}<option>{{ t['full_name'] }}</option>{% endfor %}
        </select></div>
      <div class="form-group"><label class="form-label">Room</label>
        <input class="form-ctrl" type="text" name="room" placeholder="e.g. Room A101"></div>
    </div>
    <div class="form-group"><label class="form-label">Class Group</label>
      <input class="form-ctrl" type="text" name="class_group" required placeholder="e.g. M1A"></div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button type="submit" class="btn btn-primary">Add Entry</button>
      <a href="/timetable" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
