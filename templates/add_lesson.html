{% extends "base.html" %}
{% block title %}Add Lesson{% endblock %}
{% block page_title %}Add Lesson{% endblock %}

{% block subtitle %}Publish a new lesson for students{% endblock %}
{% block content %}
<div class="card" style="max-width:680px;">
  <div class="card-head"><div class="card-title">New Lesson</div></div>
  <form method="POST">
    <div class="form-group"><label class="form-label">Lesson Title</label>
      <input class="form-ctrl" type="text" name="title" required placeholder="e.g. Introduction to Strategic Management"></div>
    <div class="form-row f2">
      <div class="form-group"><label class="form-label">Subject</label>
        <input class="form-ctrl" type="text" name="subject" required placeholder="e.g. Management"></div>
      <div class="form-group"><label class="form-label">Class Group</label>
        <input class="form-ctrl" type="text" name="class_group" placeholder="e.g. M1A (leave blank for all)"></div>
    </div>
    <div class="form-group"><label class="form-label">Short Description</label>
      <input class="form-ctrl" type="text" name="description" placeholder="One-line summary of the lesson"></div>
    <div class="form-group"><label class="form-label">Lesson Content</label>
      <textarea class="form-ctrl" name="content" style="min-height:160px;" placeholder="Full lesson text, notes, or outline..."></textarea></div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button type="submit" class="btn btn-primary">Publish Lesson</button>
      <a href="/lessons" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
